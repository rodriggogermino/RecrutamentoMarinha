<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Marinha Portuguesa</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="login-nav">
        <div class="nav-container">
            <div class="logo-group">
                <img src="Utilities/Images/logoMarinha.png" alt="Marinha">
                <span>Recrutamento</span>
            </div>
            <div class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- FORMULÁRIO DE LOGIN -->
    <main class="login-container">
        <h1>Login</h1>
        
        <form class="login-form">
            <div class="input-box">
                <input type="email" placeholder="email" required>
            </div>
            <div class="input-box">
                <input type="password" placeholder="pass" required>
            </div>
            
            <button type="submit" class="btn-entrar">Entrar</button>
            
            <div class="login-links">
                <a href="#">esqueci-me da password</a>
                <a href="#" class="bold">Registar-me</a>
            </div>
        </form>

        <!-- BOTÃO LATERAL CHAT -->
        <div class="side-chat">
            <span>CHAT</span>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="login-footer">
        <div class="footer-top">
            <img src="Utilities/Images/logoWhite.png" alt="Marinha" class="footer-logo">
            <div class="social-icons">
                <!-- Substitua por SVGs ou FontAwesome -->
                <a href="#">W</a>
                <a href="#">I</a>
                <a href="#">F</a>
                <a href="#">X</a>
                <a href="#">L</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>2026, RECRUTAMENTO | Acessibilidade | Glossário | Cookies | Avisos Legais | Links Úteis | Mapa do Site | Contactos</p>
        </div>
    </footer>

</body>
</html>
